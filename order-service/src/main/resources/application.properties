spring.application.name=order-service
server.port=8083

# Server Configuration
server.servlet.context-path=/orders
server.shutdown=graceful
server.forward-headers-strategy=framework

# Database Configuration (PostgreSQL - Neon)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-sweet-art-ao6w4iry-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
spring.datasource.username=${DATABASE_USER:neondb_owner}
spring.datasource.password=${DATABASE_PASSWORD:npg_80RpSBZavAdF}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'create' drops and recreates tables on startup — fixes any corrupted DDL from previous deployments.
# Change back to 'update' after the first clean run.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Actuator Configuration (Health checks)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method

# Security & JWT Configuration
app.jwt.secret=${JWT_SECRET:your-super-secret-key-change-in-production-env}

# Service URLs for inter-service communication
service.auth.url=http://auth-service:8081
service.catalog.url=http://catalog-service:8082
service.payment.url=http://payment-service:8084

# Resilience4j Configuration
resilience4j.circuitbreaker.instances.catalogService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.catalogService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.catalogService.failureRateThreshold=50.0
resilience4j.circuitbreaker.instances.catalogService.waitDurationInOpenState=5000
resilience4j.circuitbreaker.instances.catalogService.permittedNumberOfCallsInHalfOpenState=3

resilience4j.timelimiter.instances.catalogService.timeoutDuration=3s

# Logging
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n