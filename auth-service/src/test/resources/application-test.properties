# Test-specific configuration — isolated H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# JWT Config (predictable for tests)
app.jwt.secret=test-super-secret-jwt-key-minimum-32-characters-needed-for-hmac
app.jwt.access-expiration=900000
app.jwt.issuer=food-ordering-system
app.auth.refresh-expiry-days=7

# Bootstrap admin for integration tests
app.admin.bootstrap.enabled=true
app.admin.bootstrap.username=admin
app.admin.bootstrap.email=admin@local.test
app.admin.bootstrap.password=Admin@12345
app.admin.bootstrap.full-name=System Admin

# Quiet logging in tests
logging.level.root=WARN
logging.level.com.example=WARN
logging.level.org.springframework.security=WARN
