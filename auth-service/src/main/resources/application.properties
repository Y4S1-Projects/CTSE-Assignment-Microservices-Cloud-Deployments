spring.application.name=auth-service
server.port=${SERVER_PORT:8081}

# Load secrets from .env when running locally
spring.config.import=optional:file:.env[.properties]

# Server Configuration
server.servlet.context-path=/auth
server.shutdown=graceful
server.forward-headers-strategy=framework

# PostgreSQL Configuration (Neon)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-late-paper-a8qs55xj-pooler.eastus2.azure.neon.tech:5432/neondb?sslmode=require&channel_binding=require}
spring.datasource.username=${DATABASE_USER:neondb_owner}
spring.datasource.password=${DATABASE_PASSWORD:npg_jCnufk2oOc3Y}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Actuator Configuration (Health checks)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method

# Security & JWT Configuration
app.jwt.secret=${JWT_SECRET:your-super-secret-key-change-in-production-env}
app.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
app.jwt.issuer=food-ordering-system
app.auth.refresh-expiry-days=${JWT_REFRESH_EXPIRY_DAYS:7}
app.admin.bootstrap.enabled=true
app.admin.bootstrap.email=admin@example.com
app.admin.bootstrap.password=${ADMIN_PASSWORD:Admin@12345}
app.admin.bootstrap.full-name=System Admin
app.customer.bootstrap.enabled=true
app.customer.bootstrap.email=customer@local.test
app.customer.bootstrap.password=${CUSTOMER_PASSWORD:Customer@12345}
app.customer.bootstrap.full-name=Default Customer

# Logging
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n