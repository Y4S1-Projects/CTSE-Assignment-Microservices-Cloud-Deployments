spring.application.name=auth-service
server.port=8081

# Server Configuration
server.servlet.context-path=/auth
server.shutdown=graceful
server.forward-headers-strategy=framework

# Database Configuration (PostgreSQL-ready with H2 fallback)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA/Hibernate Configuration
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator Configuration (Health checks)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method

# Security & JWT Configuration
app.jwt.secret=${JWT_SECRET:your-super-secret-key-change-in-production-env}
app.jwt.access-expiration=900000
app.jwt.issuer=food-ordering-system
app.auth.refresh-expiry-days=7
app.admin.bootstrap.enabled=true
app.admin.bootstrap.username=admin
app.admin.bootstrap.email=admin@local.test
app.admin.bootstrap.password=Admin@12345
app.admin.bootstrap.full-name=System Admin

# Logging
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n