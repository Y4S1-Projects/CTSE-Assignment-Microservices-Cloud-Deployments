spring.application.name=auth-service
server.port=${SERVER_PORT:8081}

# Load secrets from .env when running locally
spring.config.import=optional:file:.env[.properties]

# Server Configuration
server.servlet.context-path=/auth
server.shutdown=graceful
server.forward-headers-strategy=framework

# MongoDB Configuration
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/food_delivery_system}
spring.data.mongodb.auto-index-creation=true

# Actuator Configuration (Health checks)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method

# Security & JWT Configuration
app.jwt.secret=${JWT_SECRET:your-super-secret-key-change-in-production-env}
app.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
app.jwt.issuer=food-ordering-system
app.auth.refresh-expiry-days=${JWT_REFRESH_EXPIRY_DAYS:7}
app.admin.bootstrap.enabled=true
app.admin.bootstrap.username=admin
app.admin.bootstrap.email=admin@local.test
app.admin.bootstrap.password=${ADMIN_PASSWORD:Admin@12345}
app.admin.bootstrap.full-name=System Admin
app.customer.bootstrap.enabled=true
app.customer.bootstrap.username=customer
app.customer.bootstrap.email=customer@local.test
app.customer.bootstrap.password=${CUSTOMER_PASSWORD:Customer@12345}
app.customer.bootstrap.full-name=Default Customer

# Logging
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n