name: Build, Scan & Deploy Microservices

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read
  packages: write
  id-token: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  AZURE_APP_PREFIX: ctse-assignment
  AZURE_RESOURCE_GROUP: ctse-assignment
  AZURE_ENVIRONMENT_NAME: ctse-assignment-env
  AZURE_LOCATION: eastus

jobs:
  # ==================== MATRIX BUILD FOR ALL SERVICES ====================
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, auth-service, catalog-service, order-service, payment-service]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: maven

      - name: Build service - ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          mvn clean package -DskipTests --batch-mode

      - name: Test service - ${{ matrix.service }}
        continue-on-error: true
        run: |
          cd ${{ matrix.service }}
          mvn test --batch-mode

  frontend-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # ==================== SECURITY SCANNING ====================
  security-scan:
    runs-on: ubuntu-latest
    needs: build-matrix
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  build-docker:
    runs-on: ubuntu-latest
    needs: [build-matrix, frontend-build, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [api-gateway, auth-service, catalog-service, order-service, payment-service, frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase repo name
        id: repo
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.repo_lc }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.repo_lc }}/${{ matrix.service }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public - ${{ matrix.service }}
        run: |
          PACKAGE_NAME="${{ matrix.service }}"
          echo "Making $PACKAGE_NAME package public..."
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/packages/container/$PACKAGE_NAME/visibility \
            -d '{"visibility":"public"}' || echo "Note: May already be public or require manual update"

  # ==================== MANUAL DEPLOYMENT NOTICE ====================
  manual-deployment-notice:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check Deployment Status
        run: |
          echo "🎉 ✅ Docker images built successfully and pushed to GitHub Container Registry!"
          echo ""
          echo "📦 Container Images Ready:"
          echo "  • ghcr.io/${{ github.repository_owner }}/ctse-assignment-microservices-cloud-deployments/api-gateway:${{ github.sha }}"
          echo "  • ghcr.io/${{ github.repository_owner }}/ctse-assignment-microservices-cloud-deployments/auth-service:${{ github.sha }}"
          echo "  • ghcr.io/${{ github.repository_owner }}/ctse-assignment-microservices-cloud-deployments/catalog-service:${{ github.sha }}"
          echo "  • ghcr.io/${{ github.repository_owner }}/ctse-assignment-microservices-cloud-deployments/order-service:${{ github.sha }}"
          echo "  • ghcr.io/${{ github.repository_owner }}/ctse-assignment-microservices-cloud-deployments/payment-service:${{ github.sha }}"
          echo "  • ghcr.io/${{ github.repository_owner }}/ctse-assignment-microservices-cloud-deployments/frontend:${{ github.sha }}"
          echo ""
          echo "⚠️  AZURE_CREDENTIALS secret not configured - Automatic deployment skipped"
          echo ""
          echo "🚀 To deploy to Azure manually:"
          echo "1. Open PowerShell on your local machine"
          echo "2. Navigate to your project directory"
          echo "3. Run: az login"
          echo "4. Run: .\deployment\deploy-from-github.ps1"
          echo ""
          echo "💸 The script uses scale-to-zero, max 1 replica, and small CPU/memory sizes for demo-friendly cost control."
          echo ""
          echo "💡 University accounts often lack permissions to create service principals."
          echo "   Manual deployment with 'az login' is the recommended approach."

  # ==================== DEPLOY TO AZURE CONTAINER APPS ====================
  deploy-to-azure:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Azure Credentials
        id: check-creds
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️  AZURE_CREDENTIALS not configured - skipping deployment"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
            echo "✅ AZURE_CREDENTIALS configured - proceeding with deployment"
          fi

      - name: Azure Login
        if: steps.check-creds.outputs.configured == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        id: azure-login

      - name: Verify Azure Authentication
        if: steps.check-creds.outputs.configured == 'true'
        run: |
          echo "🔍 Verifying Azure authentication..."
          az account show
          echo "✅ Successfully authenticated to Azure"

      - name: Deploy Services to Azure Container Apps
        if: steps.check-creds.outputs.configured == 'true'
        shell: pwsh
        run: |
          ./deployment/deploy-from-github.ps1 `
            -AppPrefix "${{ env.AZURE_APP_PREFIX }}" `
            -ResourceGroup "${{ env.AZURE_RESOURCE_GROUP }}" `
            -EnvironmentName "${{ env.AZURE_ENVIRONMENT_NAME }}" `
            -Location "${{ env.AZURE_LOCATION }}" `
            -GitHubRepo "${{ github.repository }}" `
            -ImageTag "${{ github.sha }}" `
            -JwtSecret "${{ secrets.JWT_SECRET }}" `
            -GitHubUsername "${{ github.actor }}" `
            -GitHubToken "${{ secrets.GITHUB_TOKEN }}"

      - name: Capture deployment URLs
        if: steps.check-creds.outputs.configured == 'true'
        id: capture-urls
        shell: bash
        run: |
          GATEWAY_APP="${{ env.AZURE_APP_PREFIX }}-api-gateway"
          FRONTEND_APP="${{ env.AZURE_APP_PREFIX }}-frontend"

          GATEWAY_URL=$(az containerapp show \
            --name "$GATEWAY_APP" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv 2>/dev/null || echo "")

          FRONTEND_URL=$(az containerapp show \
            --name "$FRONTEND_APP" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv 2>/dev/null || echo "")

          echo "gateway_url=$GATEWAY_URL" >> $GITHUB_OUTPUT
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT

      - name: Post Deployment Summary
        if: steps.check-creds.outputs.configured == 'true'
        run: |
          echo "## 🚀 Deployment Information" >> $GITHUB_STEP_SUMMARY
          echo "**Repository**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Services" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ frontend (external)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ api-gateway (external)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ auth-service (internal)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ catalog-service (internal)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ order-service (internal)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ payment-service (internal)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Cost Controls" >> $GITHUB_STEP_SUMMARY
          echo "- Scale to zero enabled for every app" >> $GITHUB_STEP_SUMMARY
          echo "- Max replicas capped at 1" >> $GITHUB_STEP_SUMMARY
          echo "- Small CPU and memory allocations for demo traffic" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.capture-urls.outputs.frontend_url }}" ]; then
            echo "### Frontend URL" >> $GITHUB_STEP_SUMMARY
            echo "https://${{ steps.capture-urls.outputs.frontend_url }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ steps.capture-urls.outputs.gateway_url }}" ]; then
            echo "### 🌐 API Gateway URL" >> $GITHUB_STEP_SUMMARY
            echo "https://${{ steps.capture-urls.outputs.gateway_url }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Test Endpoints:**" >> $GITHUB_STEP_SUMMARY
            echo "- Health: https://${{ steps.capture-urls.outputs.gateway_url }}/health" >> $GITHUB_STEP_SUMMARY
            echo "- Swagger UI: https://${{ steps.capture-urls.outputs.gateway_url }}/swagger-ui.html" >> $GITHUB_STEP_SUMMARY
            echo "- Auth Register: POST https://${{ steps.capture-urls.outputs.gateway_url }}/auth/register" >> $GITHUB_STEP_SUMMARY
          fi

  # ==================== SMOKE TESTS ====================
  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-to-azure
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true

      - name: Get API Gateway URL
        id: get-url
        run: |
          GATEWAY_APP="${{ env.AZURE_APP_PREFIX }}-api-gateway"
          FRONTEND_APP="${{ env.AZURE_APP_PREFIX }}-frontend"
          GATEWAY_URL=$(az containerapp show \
            --name "$GATEWAY_APP" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv 2>/dev/null || echo "")
          FRONTEND_URL=$(az containerapp show \
            --name "$FRONTEND_APP" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv 2>/dev/null || echo "")
          echo "url=$GATEWAY_URL" >> $GITHUB_OUTPUT
          echo "frontend=$FRONTEND_URL" >> $GITHUB_OUTPUT

      - name: Smoke Test
        continue-on-error: true
        run: |
          echo "🧪 Running smoke tests..."
          GATEWAY_URL="${{ steps.get-url.outputs.url }}"
          FRONTEND_URL="${{ steps.get-url.outputs.frontend }}"

          if [ -z "$GATEWAY_URL" ]; then
            echo "⚠️  Could not retrieve Gateway URL. Skipping smoke tests."
            echo "📝 You may need to manually verify deployment in Azure Portal"
            exit 0
          fi

          echo "Testing Gateway URL: https://$GATEWAY_URL"

          # Test Gateway Health
          echo "Testing /health endpoint..."
          if curl -f -s -m 10 "https://$GATEWAY_URL/health"; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed"
          fi

          # Test Gateway Root
          echo "Testing / endpoint..."
          if curl -f -s -m 10 "https://$GATEWAY_URL/"; then
            echo "✅ Root endpoint passed"
          else
            echo "❌ Root endpoint failed"
          fi

          # Test Auth Service through Gateway
          echo "Testing /auth/health endpoint..."
          if curl -f -s -m 10 "https://$GATEWAY_URL/auth/health"; then
            echo "✅ Auth health check passed"
          else
            echo "❌ Auth health check failed"
          fi

          if [ -n "$FRONTEND_URL" ]; then
            echo "Testing frontend root..."
            if curl -f -s -m 15 "https://$FRONTEND_URL/" > /dev/null; then
              echo "✅ Frontend root passed"
            else
              echo "❌ Frontend root failed"
            fi
          fi

          echo "✅ Smoke tests completed"

  # ==================== FINAL REPORT ====================
  summary:
    runs-on: ubuntu-latest
    needs: [build-matrix, frontend-build, security-scan, build-docker, deploy-to-azure, smoke-test]
    if: always()
    steps:
      - name: Create Pipeline Summary
        run: |
          echo "## 🎯 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Build & Test | ${{ needs.build-matrix.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Docker Images | ${{ needs.build-docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy to Azure | ${{ needs.deploy-to-azure.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Services Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend (Port 3000)" >> $GITHUB_STEP_SUMMARY
          echo "- API Gateway (Port 8080)" >> $GITHUB_STEP_SUMMARY
          echo "- Auth Service (Port 8081)" >> $GITHUB_STEP_SUMMARY
          echo "- Catalog Service (Port 8082)" >> $GITHUB_STEP_SUMMARY
          echo "- Order Service (Port 8083)" >> $GITHUB_STEP_SUMMARY
          echo "- Payment Service (Port 8084)" >> $GITHUB_STEP_SUMMARY
